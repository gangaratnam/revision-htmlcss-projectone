<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" href="https://googleapis.com" />
    <link href="./login.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
    />
  </head>

  <body>
    <div>
      <img src="./assets/Login.gif" alt="Login Animation" class="login-image" />
    </div>
    <div class="login-card">
      <h2>Login</h2>
      <p class="subtitle">Hey There👋</p>

      <form id="loginForm">
        <div class="form-section">
          <label for="username">User Name</label>
          <input id="username" type="text" placeholder="Enter User Name" />

          <label for="password">Password</label>
          <div class="password-container">
            <input id="password" type="password" placeholder="Enter Password" />
            <span id="togglePassword" class="material-symbols-outlined eye">
              visibility</span
            >
          </div>

          <button id="loginButton" class="btn" type="submit">Login</button>
        </div>

        <div class="form-footer">
          <label class="remember">
            <input type="checkbox" />
            Remember me
          </label>

          <a href="#">Forgot Password?</a>
        </div>

        <p class="signup-text">
          Don't have an account?
          <a href="#">Sign Up</a>
        </p>
      </form>
    </div>
  </body>
  <script src="./mock-data/user.js" defer></script>
</html>
